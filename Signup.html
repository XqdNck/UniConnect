<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | UniConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="Signup.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- Close Button -->
            <button class="close-btn" onclick="window.location.href='Homepage.html'">
                <i class="fas fa-times"></i>
            </button>

            <img src="assets/logo.png" alt="UniConnect Logo" class="logo">
            <h1>Create Your Account</h1>
            
            <form id="signupForm">
                <!-- Name Fields -->
                <div class="name-fields">
                    <div class="input-group">
                        <input type="text" id="firstName" placeholder="First Name" required>
                    </div>
                    <div class="input-group">
                        <input type="text" id="middleName" placeholder="Middle Name">
                    </div>
                    <div class="input-group">
                        <input type="text" id="lastName" placeholder="Last Name" required>
                    </div>
                </div>

                <!-- Email -->
                <div class="input-group">
                    <input type="email" id="email" placeholder="UNIBEN Email (your.name@uniben.edu)" required>
                </div>
                
                <!-- Password -->
                <div class="input-group">
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Password (6+ characters)" required>
                        <button type="button" class="toggle-password">👁️</button>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="input-group">
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                        <button type="button" class="toggle-password">👁️</button>
                    </div>
                </div>
                
                <button type="submit" class="submit-btn">Sign Up</button>
            </form>
            
            <p class="login-link">
                Already have an account? <a href="Login.html">Log in</a>
            </p>
            
            <div id="errorMessage" class="error-message"></div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/11.9.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.9.1/firebase-auth-compat.js"></script>
    <script src="Signup.js"></script>
</body>
</html>
